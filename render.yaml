# Render Blueprint — single Docker web service serving both API and React frontend.
#
# SETUP STEPS:
# 1. Push this repo to GitHub.
# 2. Render dashboard → New → Blueprint → connect your repo.
# 3. Set the env vars marked sync:false in the Render dashboard after first deploy:
#      SF_TOKEN_URL, SF_CLIENT_ID, SF_CLIENT_SECRET,
#      DEEPSEEK_API_KEY (primary chat model), OPENROUTER_API_KEY (chat fallback),
#      GEMINI_API_KEY (fridge-photo identification)
#    CORS_ALLOW_ORIGINS can be set to your Render service URL or left as "*"
#    since frontend and API share the same origin — CORS is only needed for
#    local Vite dev (port 5173).

services:
  - type: web
    name: price-compare
    runtime: docker
    plan: free
    healthCheckPath: /docs
    envVars:
      - key: SF_TOKEN_URL
        sync: false
      - key: SF_CLIENT_ID
        sync: false
      - key: SF_CLIENT_SECRET
        sync: false
      - key: SF_API_VERSION
        value: "60.0"
      - key: SF_QUERY_LIMIT
        value: "200"
      - key: SF_RESULTS_PER_SOURCE
        value: "3"
      # Chat/agent LLM: DeepSeek is primary, OpenRouter is the automatic fallback.
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: "deepseek-v4-flash"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: "openai/gpt-oss-120b"
      - key: OPENROUTER_FALLBACK_MODEL
        value: "openrouter/free"
      # Fridge-photo identification (Gemini primary, OpenRouter free fallback).
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: "gemini-2.5-flash"
      # Live store spokes (hub-spoke search). Without these the live spokes are no-ops.
      - key: SEARCH_PRODUCT_FLIPKART_URL
        value: "https://flipkart-scraper-production-d2de.up.railway.app/api/search"
      - key: SEARCH_PRODUCT_AMAZON_URL
        value: "https://amazon-scraper-production.up.railway.app/api/search"
      # Cart checkout + OTP submission endpoints.
      - key: FLIPKART_ADD_CART_URL
        value: "https://flipkart-scraper-production-d2de.up.railway.app/api/cart"
      - key: AMAZON_ADD_CART_URL
        value: "https://amazon-scraper-production.up.railway.app/api/cart"
      - key: OTP_API_URL
        value: "https://amazon-fresh-history-production.up.railway.app/api/otp"
      - key: CORS_ALLOW_ORIGINS
        value: "*"
      - key: LOG_LEVEL
        value: "INFO"
      # Recommendation engine ("next purchase" insights). Defaults to the
      # production Railway endpoint; override here to point at another deployment.
      - key: RECOMMENDATION_API_URL
        value: "https://insight-generation-production-3544.up.railway.app/api/insights/next-purchase"
      # Product refresh triggers (re-scrape orders into Salesforce).
      - key: REFRESH_AMAZON_URL
        value: "https://amazon-scraper-production.up.railway.app/api/products"
      - key: REFRESH_FLIPKART_URL
        value: "https://flipkart-scraper-production-d2de.up.railway.app/api/products"
      - key: REFRESH_ORDERS
        value: "2"
